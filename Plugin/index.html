<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Loon 插件仓库</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        /* --- 变量定义 --- */
        :root {
            --accent: #0078e7;
            --bg: #fafbfe;
            /* 白底带一点点蓝 */
            --card: #fff;
            --radius: 12px;
        }

        /* --- 全局样式 --- */
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
        }

        /* --- 头部 --- */
        header {
            text-align: center;
            padding: 1.4rem 1rem;
        }

        header h1 {
            margin: .2rem 0;
            font-size: 1.6rem;
            color: var(--accent);
        }

        header p {
            margin: .3rem 0 0;
            font-size: .9rem;
            color: #666;
        }

        /* --- 主要内容布局 --- */
        .wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem;
        }

        /* --- 搜索和过滤区域 --- */
        .search-box {
            background: var(--card);
            border: 1px solid #e1e4e8;
            border-radius: var(--radius);
            padding: .9rem;
            margin-bottom: 1rem;
        }

        #search {
            width: 100%;
            padding: .6rem .8rem;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: var(--radius);
        }

        .tabs {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
            margin-top: .6rem;
        }

        .tabs button {
            padding: .4rem .9rem;
            border: 1px solid #ddd;
            border-radius: var(--radius);
            background: #fff;
            font-size: .85rem;
            cursor: pointer;
            min-width: 96px;
            text-align: center;
        }

        .tabs button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* --- 插件列表 --- */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 .6rem .1rem;
        }

        .list {
            display: grid;
            gap: .7rem;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        }

        /* --- 插件卡片 --- */
        .card {
            background: var(--card);
            border: 1px solid #e1e4e8;
            border-radius: var(--radius);
            padding: .9rem;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: box-shadow .2s, background-color .15s ease, transform .15s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
        }

        .card:active {
            background-color: #e6f0ff;
            transform: scale(.98);
        }

        .card-inner-layout {
            display: flex;
            align-items: flex-start;
            gap: .7rem;
        }

        .card-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            object-fit: cover;
            margin-top: 3px;
            flex-shrink: 0;
        }

        .card-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: .5rem;
        }

        .card-title {
            margin: 0;
            font-size: 1.1rem;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-update-time {
            margin: .2rem 0 .4rem;
            font-size: .75rem;
            color: #888;
        }

        .card-desc {
            margin: 0;
            font-size: .85rem;
            color: #555;
            flex-grow: 1;
        }
        
        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: .4rem;
            justify-content: flex-end;
            flex-shrink: 0;
        }

        .tag-item {
            padding: .2rem .5rem;
            font-size: .7rem;
            color: #333;
            background: #f0f0f0;
            border-radius: 8px;
            white-space: nowrap;
        }

        /* --- 空状态 --- */
        .empty {
            text-align: center;
            color: #666;
            padding: 2rem;
            grid-column: 1 / -1;
        }

        /* --- 页脚 --- */
        footer {
            text-align: center;
            font-size: .8rem;
            color: #666;
            margin: 2rem 0;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>Loon 插件仓库</h1>
        <p>从 GitHub 仓库获取最新的 Loon 插件，点击插件卡片即可快速跳转安装</p>
    </header>

    <div class="wrap">
        <div class="search-box">
            <input id="search" placeholder="搜索插件名称或标签…">
            <div class="tabs">
                <button class="tab active" data-cat="all">全部</button>
                <button class="tab" data-cat="去广告">去广告</button>
                <button class="tab" data-cat="功能增强">功能增强</button>
                <button class="tab" data-cat="解锁会员">解锁会员</button>
                <button class="tab" data-cat="定时任务">定时任务</button>
            </div>
        </div>

        <div class="section-title" id="sectionTitle">正在加载…</div>
        <div class="list" id="list">
            <div class="empty">正在从 GitHub 加载插件列表，请稍候…</div>
        </div>
    </div>

    <footer>
        数据来源：
        <a href="https://github.com/sooyaaabo/Loon" target="_blank">GitHub - sooyaaabo/Loon</a><br>
        更新时间：<span id="updateTime">--</span><br>
        &copy; 2025 sooyaaabo. 保留所有权利。
    </footer>

    <script>
        // 使用立即执行的异步函数 (IIFE) 来避免污染全局作用域
        (async () => {
            // --- 全局常量和变量 ---
            const GITHUB_REPO = 'sooyaaabo/Loon';
            const PLUGIN_DIR_PATH = 'Plugin';

            // --- DOM 元素获取 ---
            const listEl = document.getElementById('list');
            const searchEl = document.getElementById('search');
            const tabsEl = document.querySelector('.tabs');
            const sectionTitleEl = document.getElementById('sectionTitle');
            const updateTimeEl = document.getElementById('updateTime');

            let plugins = []; // 用于存储所有解析后的插件信息

            /* 1. 数据获取和解析 */
            try {
                // 从 GitHub API 获取仓库中指定目录下的所有文件信息
                const allFilesResponse = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${PLUGIN_DIR_PATH}`);
                const allFiles = await allFilesResponse.json();
                
                // 检查返回的是否为数组，如果不是，则说明 API 请求失败或目录不存在
                if (!Array.isArray(allFiles)) {
                    throw new Error('无法获取插件列表，请检查仓库路径或网络。');
                }

                // 筛选出所有以 .plugin 结尾的文件
                const pluginFiles = allFiles.filter(file => file.name.toLowerCase().endsWith('.plugin'));

                if (pluginFiles.length === 0) {
                    throw new Error(`在仓库中没有找到任何 .plugin 文件。`);
                }

                // 并发获取所有 .plugin 文件的文本内容
                const pluginContents = await Promise.all(
                    pluginFiles.map(file => fetch(file.download_url).then(res => res.text()))
                );

                // 解析每个文件的内容，提取插件元数据
                plugins = pluginContents.map((text, i) => {
                    const file = pluginFiles[i];
                    
                    // 使用正则表达式从文件内容中提取字段，如果找不到则提供默认值
                    const name = (text.match(/#!\s*name\s*=\s*(.+)/i) || [])[1]?.trim() || file.name;
                    const desc = (text.match(/#!\s*desc\s*=\s*(.+)/i) || [])[1]?.trim() || '暂无描述';
                    const icon = (text.match(/#!\s*icon\s*=\s*(.+)/i) || [])[1]?.trim() || '';
                    const date = (text.match(/#!\s*date\s*=\s*(.+)/i) || [])[1]?.trim() || '未知';

                    const tagStr = (text.match(/#!\s*tag\s*=\s*(.+)/i) || [])[1]?.trim();
                    const tags = tagStr ? tagStr.split(',').map(t => t.trim()).filter(Boolean) : [];

                    // 返回结构化的插件对象
                    return {
                        url: file.download_url,
                        name,
                        desc,
                        icon,
                        date,
                        tags
                    };
                });

            } catch (error) {
                // 如果在获取或解析过程中出错，则在页面上显示错误信息
                listEl.innerHTML = `<div class="empty">加载插件失败：${error.message}</div>`;
                sectionTitleEl.textContent = '加载失败';
                return; // 终止脚本执行
            }

            /* 2. 获取 README 文件的最新提交时间作为网站更新时间 */
            try {
                const commitsResponse = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/commits?path=README.md`);
                const commits = await commitsResponse.json();
                
                // 获取最新一次提交的作者或提交者日期
                const latest = commits[0]?.commit?.author?.date || commits[0]?.commit?.committer?.date;
                if (latest) {
                    const d = new Date(latest);
                    updateTimeEl.textContent = d.toLocaleString('zh-CN', {
                        year: 'numeric', month: '2-digit', day: '2-digit', 
                        hour: '2-digit', minute: '2-digit'
                    });
                }
            } catch {
                updateTimeEl.textContent = '获取失败';
            }

            /* 3. 渲染与交互 */
            function render(filterCat = 'all', kw = '') {
                const lowerKw = kw.toLowerCase(); // 搜索关键词转为小写以进行不区分大小写的匹配

                // 过滤插件
                const filtered = plugins.filter(p => {
                    const hitCat = filterCat === 'all' || p.tags.includes(filterCat);
                    const hitKw = !lowerKw || 
                                  p.name.toLowerCase().includes(lowerKw) || 
                                  p.tags.some(tag => tag.toLowerCase().includes(lowerKw));
                    return hitCat && hitKw;
                });

                // 更新标题显示
                sectionTitleEl.textContent = `${(filterCat === 'all' ? '全部' : filterCat)} · ${filtered.length} 个插件`;
                listEl.innerHTML = ''; // 清空现有列表

                // 如果没有匹配的插件，显示空状态
                if (!filtered.length) {
                    listEl.innerHTML = '<div class="empty">暂无匹配的插件</div>';
                    return;
                }

                // 遍历过滤后的插件并创建卡片
                filtered.forEach(p => {
                    const card = document.createElement('a');
                    card.className = 'card';
                    card.href = `https://www.nsloon.com/openloon/import?plugin=${p.url}`; // 点击卡片跳转到 Loon 安装链接

                    const tagsHtml = p.tags.map(tag => `<span class="tag-item">${tag}</span>`).join(' ');

                    card.innerHTML = `
                        <div class="card-inner-layout">
                            ${p.icon ? `<img src="${p.icon}" class="card-icon">` : ''}
                            <div class="card-content">
                                <div class="card-header">
                                    <h3 class="card-title">${p.name}</h3>
                                    <div class="card-tags">${tagsHtml}</div>
                                </div>
                                <p class="card-update-time">更新时间：${p.date}</p>
                                <p class="card-desc">${p.desc}</p>
                            </div>
                        </div>
                    `;

                    listEl.appendChild(card);
                });
            }

            /* 4. 绑定事件监听 */
            // 分类标签点击事件
            tabsEl.addEventListener('click', e => {
                if (e.target.matches('.tab')) {
                    // 切换 active 样式
                    tabsEl.querySelector('.active').classList.remove('active');
                    e.target.classList.add('active');
                    // 根据新的分类和当前搜索词重新渲染
                    render(e.target.dataset.cat, searchEl.value);
                }
            });

            // 搜索框输入事件
            searchEl.addEventListener('input', () => {
                // 根据当前分类和新的搜索词重新渲染
                render(tabsEl.querySelector('.tab.active').dataset.cat, searchEl.value);
            });

            // --- 初始渲染 ---
            render();

        })();
    </script>

</body>

</html>
