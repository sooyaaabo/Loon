<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Loon 插件仓库</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root {
            --accent: #0078e7;
            --bg: #fafbfe;
            /* 白底带一点点蓝 */
            --card: #fff;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
        }

        header {
            text-align: center;
            padding: 1.4rem 1rem;
        }

        header h1 {
            margin: .2rem 0;
            font-size: 1.6rem;
            color: var(--accent);
        }

        header p {
            margin: .3rem 0 0;
            font-size: .9rem;
            color: #666;
        }

        .wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem;
        }

        .search-box {
            background: var(--card);
            border: 1px solid #e1e4e8;
            border-radius: var(--radius);
            padding: .9rem;
            margin-bottom: 1rem;
        }

        #search {
            width: 100%;
            padding: .6rem .8rem;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: var(--radius);
        }

        .tabs {
            display: flex;
            gap: .5rem;
            flex-wrap: wrap;
            margin-top: .6rem;
        }

        .tabs button {
            padding: .4rem .9rem;
            border: 1px solid #ddd;
            border-radius: var(--radius);
            background: #fff;
            font-size: .85rem;
            cursor: pointer;
            min-width: 96px;
            text-align: center;
        }

        .tabs button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 .6rem .1rem;
        }

        .list {
            display: grid;
            gap: .7rem;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        }

        .card {
            background: var(--card);
            border: 1px solid #e1e4e8;
            border-radius: var(--radius);
            padding: .9rem;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: box-shadow .2s, background-color .15s ease, transform .15s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
        }

        .card:active {
            background-color: #e6f0ff;
            transform: scale(.98);
        }

        .card-inner-layout {
            display: flex;
            align-items: flex-start;
            gap: .7rem;
        }

        .card-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            object-fit: cover;
            margin-top: 3px;
            flex-shrink: 0;
        }

        .card-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: .5rem;
        }

        .card-title {
            margin: 0;
            font-size: 1.1rem;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-update-time {
            margin: .2rem 0 .4rem;
            font-size: .75rem;
            color: #888;
        }

        .card-desc {
            margin: 0;
            font-size: .85rem;
            color: #555;
            flex-grow: 1;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: .4rem;
            justify-content: flex-end;
            flex-shrink: 0;
        }

        .tag-item {
            padding: .2rem .5rem;
            font-size: .7rem;
            color: #333;
            background: #f0f0f0;
            border-radius: 8px;
            white-space: nowrap;
        }

        .empty {
            text-align: center;
            color: #666;
            padding: 2rem;
            grid-column: 1 / -1;
        }

        footer {
            text-align: center;
            font-size: .8rem;
            color: #666;
            margin: 2rem 0;
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>Loon 插件仓库</h1>
        <p>从 GitHub 仓库获取最新的 Loon 插件，点击插件卡片即可快速跳转安装</p>
    </header>

    <div class="wrap">
        <div class="search-box">
            <input id="search" placeholder="搜索插件名称或标签…">
            <div class="tabs">
                <button class="tab active" data-cat="all">全部</button>
                <button class="tab" data-cat="去广告">去广告</button>
                <button class="tab" data-cat="功能增强">功能增强</button>
                <button class="tab" data-cat="解锁会员">解锁会员</button>
                <button class="tab" data-cat="定时任务">定时任务</button>
            </div>
        </div>

        <div class="section-title" id="sectionTitle">正在加载…</div>
        <div class="list" id="list">
            <div class="empty">正在从 GitHub 加载插件列表，请稍候…</div>
        </div>
    </div>

    <footer>
        数据来源：
        <a href="https://github.com/sooyaaabo/Loon" target="_blank">GitHub - sooyaaabo/Loon</a><br>
        更新时间：<span id="updateTime">--</span><br>
        &copy; 2025 sooyaaabo. 保留所有权利。
    </footer>

    <script>
        (async () => {
            const GITHUB_REPO = 'sooyaaabo/Loon';
            const PLUGIN_DIR_PATH = 'Plugin';

            const listEl = document.getElementById('list');
            const searchEl = document.getElementById('search');
            const tabsEl = document.querySelector('.tabs');
            const sectionTitleEl = document.getElementById('sectionTitle');
            const updateTimeEl = document.getElementById('updateTime');

            let plugins = [];

            /* 1. 数据获取和解析 */
            try {
                const allFiles = await (await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${PLUGIN_DIR_PATH}`)).json();
                if (!Array.isArray(allFiles)) throw new Error('无法获取插件列表，请检查仓库路径或网络。');

                const pluginFiles = allFiles.filter(file => file.name.toLowerCase().endsWith('.plugin'));

                if (pluginFiles.length === 0) {
                    throw new Error(`在仓库中没有找到任何 .plugin 文件。`);
                }

                const pluginContents = await Promise.all(
                    pluginFiles.map(file => fetch(file.download_url).then(res => res.text()))
                );

                plugins = pluginContents.map((text, i) => {
                    const file = pluginFiles[i];
                    const name = (text.match(/#!\s*name\s*=\s*(.+)/i) || [])[1]?.trim() || file.name;
                    const desc = (text.match(/#!\s*desc\s*=\s*(.+)/i) || [])[1]?.trim() || '暂无描述';
                    const icon = (text.match(/#!\s*icon\s*=\s*(.+)/i) || [])[1]?.trim() || '';
                    const date = (text.match(/#!\s*date\s*=\s*(.+)/i) || [])[1]?.trim() || '未知';

                    const tagStr = (text.match(/#!\s*tag\s*=\s*(.+)/i) || [])[1]?.trim();
                    const tags = tagStr ? tagStr.split(',').map(t => t.trim()).filter(Boolean) : [];

                    return {
                        url: file.download_url,
                        name,
                        desc,
                        icon,
                        date,
                        tags
                    };
                });

            } catch (error) {
                listEl.innerHTML = `<div class="empty">加载插件失败：${error.message}</div>`;
                sectionTitleEl.textContent = '加载失败';
                return;
            }

            /* 2. 动态生成分类标签按钮 (此部分已移除) */

            /* 3. 获取仓库最新更新时间 */
            try {
                const commits = await (await fetch(`https://api.github.com/repos/${GITHUB_REPO}/commits?path=${PLUGIN_DIR_PATH}`)).json();
                const latest = commits[0]?.commit?.author?.date || commits[0]?.commit?.committer?.date;
                if (latest) {
                    const d = new Date(latest);
                    updateTimeEl.textContent = d.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
            } catch {
                updateTimeEl.textContent = '获取失败';
            }

            /* 4. 渲染与交互 */
            function render(filterCat = 'all', kw = '') {
                const lowerKw = kw.toLowerCase();
                const filtered = plugins.filter(p => {
                    const hitCat = filterCat === 'all' || p.tags.includes(filterCat);
                    const hitKw = !lowerKw || p.name.toLowerCase().includes(lowerKw) || p.tags.some(tag => tag.toLowerCase().includes(lowerKw));
                    return hitCat && hitKw;
                });

                sectionTitleEl.textContent = (filterCat === 'all' ? '全部' : filterCat) + ' · ' + filtered.length + ' 个插件';
                listEl.innerHTML = '';

                if (!filtered.length) {
                    listEl.innerHTML = '<div class="empty">暂无匹配的插件</div>';
                    return;
                }

                filtered.forEach(p => {
                    const card = document.createElement('a');
                    card.className = 'card';
                    card.href = `https://www.nsloon.com/openloon/import?plugin=${p.url}`;

                    const tagsHtml = p.tags.map(tag => `<span class="tag-item">${tag}</span>`).join(' ');

                    card.innerHTML = `
                        <div class="card-inner-layout">
                          ${p.icon ? `<img src="${p.icon}" class="card-icon">` : ''}
                          <div class="card-content">
                            <div class="card-header">
                              <h3 class="card-title">${p.name}</h3>
                              <div class="card-tags">${tagsHtml}</div>
                            </div>
                            <p class="card-update-time">更新时间：${p.date}</p>
                            <p class="card-desc">${p.desc}</p>
                          </div>
                        </div>
                      `;

                    listEl.appendChild(card);
                });
            }

            // 绑定事件监听
            tabsEl.addEventListener('click', e => {
                if (e.target.matches('.tab')) {
                    tabsEl.querySelector('.active').classList.remove('active');
                    e.target.classList.add('active');
                    render(e.target.dataset.cat, searchEl.value);
                }
            });

            searchEl.addEventListener('input', () => render(
                tabsEl.querySelector('.tab.active').dataset.cat,
                searchEl.value
            ));

            // 初始渲染
            render();
        })();
    </script>

</body>

</html>
