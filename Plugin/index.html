<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Loon 插件仓库</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="https://raw.githubusercontent.com/sooyaaabo/Loon/main/Icon/App-Icon/LoonForMac.png">
    <style>
        /* --- CSS 变量定义 --- */
        /* 使用 CSS 变量方便地管理和修改主题颜色、圆角等全局样式 */
        :root {
            --accent: #0078e7;
            /* 主题强调色 */
            --bg: #fafbfe;
            /* 页面背景色 */
            --card: #fff;
            /* 卡片背景色 */
            --radius: 12px;
            /* 全局圆角大小 */
        }

        /* --- 全局样式重置 --- */
        * {
            box-sizing: border-box;
            /* 元素的总宽度和高度包含内边距和边框 */
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            /* 优先使用苹果系统字体，提供更佳的平台一致性体验 */
            background: var(--bg);
        }

        /* --- 头部 --- */
        header {
            text-align: center;
            padding: 1.4rem 1rem;
        }

        header h1 {
            margin: .2rem 0;
            font-size: 1.6rem;
            color: var(--accent);
        }

        header p {
            margin: .3rem 0 0;
            font-size: .9rem;
            color: #666;
        }

        /* --- 主要内容容器 --- */
        .wrap {
            max-width: 1100px;
            /* 限制最大宽度，在大屏幕上保持良好阅读性 */
            margin: 0 auto;
            /* 水平居中 */
            padding: 1rem;
        }

        /* --- 横幅公告 (交叉淡入淡出效果) --- */
        .announcement-banner {
            background-color: #fff9de;
            border: 1px solid #f5f5f7;
            border-radius: var(--radius);
            margin-bottom: 1rem;
            position: relative;
            /* 作为内部绝对定位元素的参照物 */
            min-height: 3.2rem;
            /* 设置一个最小高度防止因内容绝对定位而坍塌 */
            cursor: pointer;
            /* 提示用户可以点击 */
        }

        .banner-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            /* 使用flex实现内容垂直和水平居中 */
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: .5rem 1rem;
            /* 调整内边距 */
            color: #1d1d1f;
            font-size: .9rem;
            font-weight: 500;
            line-height: 1.5;
            text-align: center;
            opacity: 0;
            /* 默认透明 */
            transition: opacity 0.6s ease-in-out;
            /* 定义透明度变化的动画效果 */
            visibility: hidden;
            /* 默认隐藏，配合 opacity 使用 */
        }

        .banner-item.active {
            opacity: 1;
            /* 显示 */
            visibility: visible;
            /* 可见 */
        }


        /* --- 搜索和过滤区域 --- */
        .search-box {
            background: var(--card);
            border: 1px solid #e1e4e8;
            border-radius: var(--radius);
            padding: .9rem;
            margin-bottom: 1rem;
        }

        #search {
            width: 100%;
            padding: .6rem .8rem;
            font-size: 1rem;
            border: 1px solid #ddd;
            border-radius: var(--radius);
        }

        .tabs {
            display: flex;
            gap: .5rem;
            /* 设置 flex-item 之间的间距 */
            flex-wrap: wrap;
            /* 当空间不足时自动换行 */
            margin-top: .6rem;
        }

        .tabs button {
            padding: .4rem .9rem;
            border: 1px solid #ddd;
            border-radius: var(--radius);
            background: #fff;
            font-size: .85rem;
            cursor: pointer;
            min-width: 96px;
            text-align: center;
        }

        .tabs button.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        /* --- 插件列表区域标题 --- */
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 0 0 .6rem .1rem;
        }

        /* --- 插件列表 (网格布局) --- */
        .list {
            display: grid;
            gap: .7rem;
            /* 网格项目之间的间距 */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            /* 响应式网格布局，每列最小300px，自动填充 */
        }

        /* --- 插件卡片 --- */
        .card {
            background: var(--card);
            border: 1px solid #e1e4e8;
            border-radius: var(--radius);
            padding: .9rem;
            text-decoration: none;
            /* 移除链接下划线 */
            color: inherit;
            /* 继承父元素颜色 */
            cursor: pointer;
            transition: box-shadow .2s, background-color .15s ease, transform .15s ease;
            /* 为交互效果添加平滑过渡 */
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
            /* 鼠标悬停时显示阴影 */
        }

        .card:active {
            background-color: #e6f0ff;
            /* 鼠标点击时改变背景色 */
            transform: scale(.98);
            /* 鼠标点击时轻微缩小 */
        }

        .card-inner-layout {
            display: flex;
            align-items: flex-start;
            /* 图标和内容顶部对齐 */
            gap: .7rem;
        }

        .card-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            object-fit: cover;
            /* 保持图片比例，裁切多余部分 */
            margin-top: 3px;
            flex-shrink: 0;
            /* 防止图标在 flex 布局中被压缩 */
        }

        .card-content {
            flex: 1;
            /* 占据剩余空间 */
            min-width: 0;
            /* 防止内容溢出时破坏布局 */
            display: flex;
            flex-direction: column;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            /* 标题和标签两端对齐 */
            align-items: flex-start;
            gap: .5rem;
        }

        .card-title {
            margin: 0;
            font-size: 1.1rem;
            color: var(--accent);
            white-space: nowrap;
            /* 防止标题换行 */
            overflow: hidden;
            /* 隐藏溢出部分 */
            text-overflow: ellipsis;
            /* 用省略号表示溢出的文本 */
        }

        .card-update-time {
            margin: .2rem 0 .4rem;
            font-size: .75rem;
            color: #888;
        }

        .card-desc {
            margin: 0;
            font-size: .85rem;
            color: #555;
            flex-grow: 1;
            /* 占据所有可用的垂直空间，确保卡片等高 */
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: .4rem;
            justify-content: flex-end;
            /* 标签靠右对齐 */
            flex-shrink: 0;
            /* 防止标签组被压缩 */
        }

        .tag-item {
            padding: .2rem .5rem;
            font-size: .7rem;
            color: #333;
            background: #f0f0f0;
            border-radius: 8px;
            white-space: nowrap;
        }

        /* --- 空状态 --- */
        .empty {
            text-align: center;
            color: #666;
            padding: 2rem;
            grid-column: 1 / -1;
            /* 在网格布局中，让空状态占据所有列 */
        }

        /* --- 页脚 --- */
        footer {
            text-align: center;
            font-size: .8rem;
            color: #666;
            margin: 2rem 0;
            line-height: 1.8;
            /* 增加行高，让多行内容不拥挤 */
        }

        footer a {
            color: var(--accent);
            text-decoration: none;
        }
    </style>
</head>

<body>

    <header>
        <h1>Loon 插件仓库</h1>
        <p>从 GitHub 仓库获取最新的 Loon 插件，点击插件卡片即可快速跳转安装</p>
    </header>

    <div class="wrap">
        <div class="announcement-banner" id="announcementBanner">
            <p class="banner-item">禁止在中华人民共和国境内平台公开传播本仓库内容以及将其用于任何商业或非法用途！如有发现，请向平台举报！</p>
            <p class="banner-item">本网站由个人制作与维护，与Loon官方无关。</p>
        </div>

        <div class="search-box">
            <input id="search" placeholder="搜索插件名称或标签…">
            <div class="tabs">
                <button class="tab active" data-cat="all">全部</button>
                <button class="tab" data-cat="去广告">去广告</button>
                <button class="tab" data-cat="功能增强">功能增强</button>
                <button class="tab" data-cat="解锁会员">解锁会员</button>
                <button class="tab" data-cat="定时任务">定时任务</button>
            </div>
        </div>

        <div class="section-title" id="sectionTitle">正在加载…</div>
        <div class="list" id="list">
            <div class="empty">正在从 GitHub 加载插件列表，请稍候…</div>
        </div>
    </div>

    <footer>
        数据来源：
        <a href="https://github.com/sooyaaabo/Loon" target="_blank">GitHub - sooyaaabo/Loon</a><br>
        更新时间：<span id="updateTime">--</span><br>
        联系方式：<a href="https://t.me/BoEchoBot" target="_blank">Telegram - sooyaaabo</a><br>
        Copyright &copy; <span id="copyright-year">2025</span> sooyaaabo. All rights reserved.
    </footer>

    <script>
        // 使用立即执行的异步函数 (IIFE) 来封装代码，避免污染全局作用域
        (async () => {
            // --- 全局常量和变量 ---
            const GITHUB_REPO = 'sooyaaabo/Loon'; // 目标 GitHub 仓库
            const PLUGIN_DIR_PATH = 'Plugin'; // 插件所在的目录

            // --- DOM 元素获取 ---
            // 提前获取所有需要操作的 DOM 元素，提高性能
            const listEl = document.getElementById('list');
            const searchEl = document.getElementById('search');
            const tabsEl = document.querySelector('.tabs');
            const sectionTitleEl = document.getElementById('sectionTitle');
            const updateTimeEl = document.getElementById('updateTime');
            // 动态设置页脚的版权年份
            document.getElementById('copyright-year').textContent = new Date().getFullYear();

            let plugins = []; // 用于存储所有解析后的插件信息

            /* 1. 数据获取和解析 */
            try {
                // 从 GitHub API 获取插件目录下的所有文件信息
                const allFilesResponse = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${PLUGIN_DIR_PATH}`);
                const allFiles = await allFilesResponse.json();

                // 如果返回的不是一个数组，说明 API 请求可能出错了
                if (!Array.isArray(allFiles)) {
                    throw new Error('无法获取插件列表，请检查仓库路径或网络。');
                }

                // 筛选出所有以 .plugin 结尾的文件
                const pluginFiles = allFiles.filter(file => file.name.toLowerCase().endsWith('.plugin'));

                if (pluginFiles.length === 0) {
                    throw new Error(`在仓库中没有找到任何 .plugin 文件。`);
                }

                // 并发获取所有 .plugin 文件的文本内容
                const pluginContents = await Promise.all(
                    pluginFiles.map(file => fetch(file.download_url).then(res => res.text()))
                );

                // 解析每个文件的内容，提取插件元数据
                plugins = pluginContents.map((text, i) => {
                    const file = pluginFiles[i];

                    // 使用正则表达式从文件内容中提取字段，如果找不到则提供默认值
                    const name = (text.match(/#!\s*name\s*=\s*(.+)/i) || [])[1]?.trim() || file.name;
                    const desc = (text.match(/#!\s*desc\s*=\s*(.+)/i) || [])[1]?.trim() || '暂无描述';
                    const icon = (text.match(/#!\s*icon\s*=\s*(.+)/i) || [])[1]?.trim() || '';
                    const date = (text.match(/#!\s*date\s*=\s*(.+)/i) || [])[1]?.trim() || '未知';

                    // 解析标签，支持以逗号分隔的多个标签
                    const tagStr = (text.match(/#!\s*tag\s*=\s*(.+)/i) || [])[1]?.trim();
                    const tags = tagStr ? tagStr.split(',').map(t => t.trim()).filter(Boolean) : [];

                    // 返回一个结构化的插件对象
                    return {
                        url: file.download_url,
                        name,
                        desc,
                        icon,
                        date,
                        tags
                    };
                });

            } catch (error) {
                // 如果在获取或解析过程中发生任何错误，则在页面上显示错误信息
                listEl.innerHTML = `<div class="empty">加载插件失败：${error.message}</div>`;
                sectionTitleEl.textContent = '加载失败';
                return; // 终止脚本执行
            }

            /* 2. 获取仓库 Plugin 目录下最新提交时间作为网站更新时间 */
            try {
                // 通过 GitHub API 获取指定目录的提交历史
                const commitsResponse = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/commits?path=${PLUGIN_DIR_PATH}`);
                const commits = await commitsResponse.json();

                // 获取最新一次提交的作者或提交者的时间
                const latestCommitDate = commits[0]?.commit?.author?.date || commits[0]?.commit?.committer?.date;
                if (latestCommitDate) {
                    const d = new Date(latestCommitDate);
                    // 将 UTC 时间格式化为本地时间字符串
                    updateTimeEl.textContent = d.toLocaleString('zh-CN', {
                        year: 'numeric',
                        month: '2-digit',
                        day: '2-digit',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                }
            } catch {
                // 如果获取提交历史失败，则显示获取失败
                updateTimeEl.textContent = '获取失败';
            }

            /* 3. 渲染与交互核心函数 */
            function render(filterCat = 'all', kw = '') {
                const lowerKw = kw.toLowerCase(); // 将搜索关键词转为小写以进行不区分大小写的匹配

                // 根据分类和关键词过滤插件
                const filtered = plugins.filter(p => {
                    const hitCat = filterCat === 'all' || p.tags.includes(filterCat); // 分类匹配
                    const hitKw = !lowerKw || // 关键词匹配（名称或标签）
                        p.name.toLowerCase().includes(lowerKw) ||
                        p.tags.some(tag => tag.toLowerCase().includes(lowerKw));
                    return hitCat && hitKw;
                });

                // 更新列表标题，显示当前筛选条件和结果数量
                sectionTitleEl.textContent = `${(filterCat === 'all' ? '全部' : filterCat)} · ${filtered.length} 个插件`;
                listEl.innerHTML = ''; // 清空现有列表

                // 如果没有匹配的插件，显示空状态提示
                if (!filtered.length) {
                    listEl.innerHTML = '<div class="empty">暂无匹配的插件</div>';
                    return;
                }

                // 遍历筛选后的插件，为每个插件创建并插入一个卡片
                filtered.forEach(p => {
                    const card = document.createElement('a');
                    card.className = 'card';
                    // 构建Loon的导入链接
                    card.href = `https://www.nsloon.com/openloon/import?plugin=${p.url}`;

                    // 将标签数组转换为 HTML 字符串
                    const tagsHtml = p.tags.map(tag => `<span class="tag-item">${tag}</span>`).join(' ');

                    // 使用模板字符串构建卡片的内部 HTML，结构清晰
                    card.innerHTML = `
                        <div class="card-inner-layout">
                            ${p.icon ? `<img src="${p.icon}" class="card-icon" alt="${p.name} icon">` : ''}
                            <div class="card-content">
                                <div class="card-header">
                                    <h3 class="card-title">${p.name}</h3>
                                    <div class="card-tags">${tagsHtml}</div>
                                </div>
                                <p class="card-update-time">更新时间：${p.date}</p>
                                <p class="card-desc">${p.desc}</p>
                            </div>
                        </div>
                    `;

                    listEl.appendChild(card);
                });
            }

            /* 4. 绑定事件监听 */
            // 监听分类标签的点击事件
            tabsEl.addEventListener('click', e => {
                if (e.target.matches('.tab')) {
                    // 切换 active 状态
                    tabsEl.querySelector('.active').classList.remove('active');
                    e.target.classList.add('active');
                    // 根据新的分类和当前的搜索词重新渲染列表
                    render(e.target.dataset.cat, searchEl.value);
                }
            });

            // 监听搜索框的输入事件
            searchEl.addEventListener('input', () => {
                // 根据当前的分类和新的搜索词重新渲染列表
                render(tabsEl.querySelector('.tab.active').dataset.cat, searchEl.value);
            });

            /* 5. 横幅滚动逻辑 (交叉淡入淡出) */
            const bannerEl = document.getElementById('announcementBanner');
            if (bannerEl) {
                const bannerItems = bannerEl.querySelectorAll('.banner-item');
                const totalBanners = bannerItems.length;
                let currentBannerIndex = 0;
                let bannerInterval; // 用于存储定时器

                // 切换到下一个横幅的函数
                function changeBanner(nextIndex) {
                    if (currentBannerIndex === nextIndex || bannerItems.length < 2) return;

                    const currentItem = bannerItems[currentBannerIndex];
                    const nextItem = bannerItems[nextIndex];

                    // 交叉淡入淡出：同时移除和添加 active 类，利用 CSS transition 实现动画
                    currentItem.classList.remove('active');
                    nextItem.classList.add('active');

                    currentBannerIndex = nextIndex;
                }

                // 启动自动循环播放
                function startBannerCycle() {
                    clearInterval(bannerInterval); // 清除已有的定时器，防止叠加
                    bannerInterval = setInterval(() => {
                        const nextIndex = (currentBannerIndex + 1) % totalBanners; // 循环计算下一个索引
                        changeBanner(nextIndex);
                    }, 3000); // 3秒切换一次
                }

                // 初始化：显示第一个横幅
                if (totalBanners > 0) {
                    bannerItems[currentBannerIndex].classList.add('active');
                }

                // 添加点击事件，手动切换
                bannerEl.addEventListener('click', () => {
                    if (totalBanners > 1) {
                        const nextIndex = (currentBannerIndex + 1) % totalBanners;
                        changeBanner(nextIndex);
                        startBannerCycle(); // 点击后重置定时器，避免立即切换
                    }
                });

                // 如果横幅数量大于1，则启动自动播放
                if (totalBanners > 1) {
                    startBannerCycle();
                }
            }


            // --- 初始渲染 ---
            // 页面加载完成后，立即执行一次渲染，显示所有插件
            render();

        })();
    </script>

</body>

</html>
