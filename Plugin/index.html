<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <title>Loon 插件仓库</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --accent: #0078e7;
      --bg: #fafbfe; /* 白底带一点点蓝 */
      --card: #fff;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
    }

    header {
      text-align: center;
      padding: 1.4rem 1rem;
    }

    header h1 {
      margin: .2rem 0;
      font-size: 1.6rem;
      color: var(--accent);
    }

    header p {
      margin: .3rem 0 0;
      font-size: .9rem;
      color: #666;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* 搜索 + 标签 一体化卡片 */
    .search-box {
      background: var(--card);
      border: 1px solid #e1e4e8;
      border-radius: var(--radius);
      padding: .9rem;
      margin-bottom: 1rem;
    }

    #search {
      width: 100%;
      padding: .6rem .8rem;
      font-size: 1rem;
      border: 1px solid #ddd;
      border-radius: var(--radius);
    }

    .tabs {
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      margin-top: .6rem;
    }

    .tabs button {
      padding: .4rem .9rem;
      border: 1px solid #ddd;
      border-radius: var(--radius);
      background: #fff;
      font-size: .85rem;
      cursor: pointer;
    }

    .tabs button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .section-title {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 .6rem .1rem;
    }

    /* 插件卡片 */
    .list {
      display: grid;
      gap: .7rem;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    }

    .card {
      background: var(--card);
      border: 1px solid #e1e4e8;
      border-radius: var(--radius);
      padding: .9rem;
      display: block;
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: box-shadow .2s, background-color .15s ease, transform .15s ease; /* 让颜色变化更平滑 */
    }

    .card:hover {
      box-shadow: 0 4px 12px rgba(0, 0, 0, .08);
    }

    /* 插件卡片被按下时的瞬间变色 */
    .card:active {
      background-color: #e6f0ff; /* 浅蓝色高亮 */
      transform: scale(.98); /* 轻微缩小，模拟按压 */
    }

    .card h3 {
      margin: .2rem 0 .3rem;
      font-size: 1.1rem;
      color: var(--accent);
    }

    .card p {
      margin: 0 0 .2rem;
      font-size: .9rem;
      color: #555;
    }

    .empty {
      text-align: center;
      color: #666;
      padding: 2rem;
    }

    /* 底部信息 */
    footer {
      text-align: center;
      font-size: .8rem;
      color: #666;
      margin: 2rem 0;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>

<body>

  <header>
    <h1>Loon 插件仓库</h1>
    <p>从 GitHub 仓库获取最新的 Loon 插件，点击插件卡片即可快速跳转安装</p>
  </header>

  <div class="wrap">
    <!-- 搜索 + 标签 一体化圆角卡片 -->
    <div class="search-box">
      <input id="search" placeholder="搜索插件名称…">
      <div class="tabs">
        <button class="tab active" data-cat="all">全部</button>
        <button class="tab" data-cat="adblock">去广告</button>
        <button class="tab" data-cat="enhance">功能增强</button>
        <button class="tab" data-cat="vip">会员解锁</button>
        <button class="tab" data-cat="cron">定时任务</button>
      </div>
    </div>

    <div class="section-title" id="sectionTitle">全部 · 0 个插件</div>
    <div class="list" id="list">
      <div class="empty">正在加载插件列表…</div>
    </div>
  </div>

  <!-- 底部信息 -->
  <footer>
    数据来源：
    <a href="https://github.com/sooyaaabo/Loon" target="_blank">GitHub - sooyaaabo/Loon</a><br>
    更新时间：<span id="updateTime">--</span><br>
    &copy; 2025 sooyaaabo. 保留所有权利。
  </footer>

  <script>
    (async () => {
      /* 1. 获取插件文件列表（仅用来检测文件存在，防止 404） */
      const pluginFiles = await (await fetch('https://api.github.com/repos/sooyaaabo/Loon/contents/Plugin')).json();
      const fileSet = new Set(pluginFiles.map(f => f.name.toLowerCase()));

      /* 2. 读取 README，解析出插件名称、分类、URL */
      const readmeText = await (await fetch('https://raw.githubusercontent.com/sooyaaabo/Loon/main/README.md')).text();
      const tables = readmeText.match(/<table[\s\S]*?<\/table>/g) || [];
      const plugins = [];
      const catMap = { '去广告': 'adblock', '功能增强': 'enhance', '会员解锁': 'vip', '定时任务': 'cron' };
      const catNameMap = Object.fromEntries(Object.entries(catMap).map(([k, v]) => [v, k]));

      tables.forEach(table => {
        const catMatch = table.match(/<strong>(.*?)<\/strong>/);
        const cat = catMap[catMatch?.[1]];
        if (!cat) return;
        const links = table.matchAll(/<a href="([^"]+)"[^>]*>(.*?)<\/a>/g);
        for (const [, href, name] of links) {
          const raw = href.replace('https://www.nsloon.com/openloon/import?plugin=', '').trim();
          const cleanName = name.replace(/<[^>]+>/g, '').trim();
          const fileName = raw.split('/').pop().toLowerCase();
          if (fileSet.has(fileName)) plugins.push({ name: cleanName, url: raw, cat });
        }
      });

      /* 3. 获取 README 最新 commit 时间 */
      try {
        const commits = await (await fetch('https://api.github.com/repos/sooyaaabo/Loon/commits?path=README.md')).json();
        const latest = commits[0]?.commit?.author?.date || commits[0]?.commit?.committer?.date;
        if (latest) {
          const d = new Date(latest);
          document.getElementById('updateTime').textContent =
            d.toLocaleString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }
      } catch {
        document.getElementById('updateTime').textContent = '获取失败';
      }

      /* 4. 渲染与交互 */
      const list = document.getElementById('list');
      const search = document.getElementById('search');
      const tabs = document.querySelectorAll('.tab');
      const sectionTitle = document.getElementById('sectionTitle');

      function render(filterCat = 'all', kw = '') {
        const filtered = plugins.filter(p => {
          const hitCat = filterCat === 'all' || p.cat === filterCat;
          const hitKw = !kw || p.name.toLowerCase().includes(kw.toLowerCase());
          return hitCat && hitKw;
        });

        sectionTitle.textContent = (catNameMap[filterCat] || '全部') + ' · ' + filtered.length + ' 个插件';
        list.innerHTML = '';
        if (!filtered.length) {
          list.innerHTML = '<div class="empty">暂无结果</div>';
          return;
        }

        filtered.forEach(p => {
          const card = document.createElement('a');
          card.className = 'card';
          card.href = 'https://www.nsloon.com/openloon/import?plugin=' + p.url;

          /* 初始骨架：图标/标题/类别/更新时间/描述 */
          card.innerHTML = `
            <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem;">
              <img class="icon" style="width:32px;height:32px;border-radius:6px;object-fit:cover;" src="" alt="">
              <div style="flex:1;position:relative;">
                <h3 style="margin:0;font-size:1.1rem;color:var(--accent);">${p.name}</h3>
                <span style="position:absolute;top:0;right:0;padding:.2rem .6rem;font-size:.75rem;color:#222;background:#e5e5ea;border-radius:var(--radius);">${catNameMap[p.cat]}</span>
                <p class="date" style="margin:.15rem 0 0;font-size:.7rem;color:#888;">更新时间：加载中…</p>
              </div>
            </div>
            <p class="desc" style="margin:.4rem 0 0;font-size:.85rem;color:#555;">加载中…</p>
          `;

          /* 异步抓取 icon / date / desc */
          (async () => {
            try {
              const text = await (await fetch(p.url)).text();

              /* icon */
              const iconMatch = text.match(/#\!\s*icon\s*=\s*(.+)/i);
              const iconUrl = iconMatch ? iconMatch[1].trim() : '';
              const iconImg = card.querySelector('.icon');
              iconImg.src = iconUrl;
              if (!iconUrl) iconImg.style.display = 'none';

              /* date */
              const dateMatch = text.match(/#\!\s*date\s*=\s*(.+)/i);
              const dateStr = dateMatch ? dateMatch[1].trim() : '未知';
              card.querySelector('.date').textContent = `更新时间：${dateStr}`;

              /* desc */
              const descMatch = text.match(/#\!\s*desc\s*=\s*(.+)/i);
              const desc = descMatch ? descMatch[1].trim() : '暂无描述';
              card.querySelector('.desc').textContent = desc;
            } catch {
              card.querySelector('.date').textContent = '更新时间：获取失败';
              card.querySelector('.desc').textContent = '描述获取失败';
            }
          })();

          list.appendChild(card);
        });
      }

      tabs.forEach(btn => btn.addEventListener('click', e => {
        tabs.forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        render(e.target.dataset.cat, search.value);
      }));

      search.addEventListener('input', e => render(
        document.querySelector('.tab.active').dataset.cat,
        e.target.value
      ));

      render();
    })();
  </script>

</body>

</html>
